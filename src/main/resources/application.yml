server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: finances-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/financialapp?currentSchema=finances}
    username: ${DB_USERNAME:financialapp}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: finances
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    schemas: finances
    default-schema: finances
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.financialapp.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.financialapp.finances.kafka.event.PaymentEvent

alerts:
  days-before-payment: ${DAYS_BEFORE_PAYMENT_ALERT:3}
  days-before-loan: ${DAYS_BEFORE_LOAN_ALERT:3}
  days-before-installment: ${DAYS_BEFORE_INSTALLMENT_ALERT:3}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
